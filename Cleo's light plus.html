  <style>

    /* Galerie principale des lampes */
    .lamp-gallery {
      gap: 20px;
      align-items: center;
      flex-direction: column;

      justify-content: center;
      margin: -700px 400px;
      padding-bottom: 100px;
    }
    .lamp-title {
        margin-top: -20px;
	margin-left: -20px;
      }

    .lamp-gallery img {
      max-width: 1000px;
      width: 100%;
      height: auto;
      border-radius: 0;
      box-shadow: none;
    }

    .sold-grid img {
      width: 100%;
      height: auto;
      border-radius: 0;
      box-shadow: none;
      display: block;
    }

    .history {
      margin-top: 200px;
    }

    .history h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Scrollbar */
    .lamp-gallery::-webkit-scrollbar,
    .sold-grid::-webkit-scrollbar {
      height: 8px;
    }

    .lamp-gallery::-webkit-scrollbar-thumb,
    .sold-grid::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }
  #Cartel {
    position: sticky;
    top: 80px;
    margin-left: 20px;
    max-width: 300px;
  }

    /* MOBILE */
  

 @media (max-width: 768px) {


      .lamp-title {
        margin-top: -40px;
        margin-left: -20px;
      }

      body.lamp-page-body {
        padding: 0 10px;
        box-sizing: border-box;
      }

      main.lamp-page {
        display: flex;
        flex-direction: column;
	margin-bottom: 0;
      }

      .lamp-gallery {
        margin: 0;
        margin-top: -1450px;
    

      }

      #Cartel {
        position: static;
        top: 80px;
        margin-left: 5px;
        transform: translateY(220px);
      }
